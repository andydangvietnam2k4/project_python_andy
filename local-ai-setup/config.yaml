name: Local Assistant
version: 1.0.0
schema: v1

models:
  - name: Qwen2.5 Coder 7B (chat)
    provider: ollama
    model: qwen2.5-coder:7b
    roles:
      - chat
      - edit
      - apply

  - name: Qwen2.5 Coder 1.5B (autocomplete)
    provider: ollama
    model: qwen2.5-coder:1.5b
    roles:
      - autocomplete

  - name: Nomic Embed (embeddings)
    provider: ollama
    model: nomic-embed-text:latest
    roles:
      - embed

context:
  - provider: code
  - provider: diff
  - provider: terminal
  - provider: problems
  - provider: folder
  - provider: codebase
